# Fly.io deployment template for the plaid-mcp hosted MCP server.
#
# Rename `app` to whatever you registered with `fly apps create <name>`.
# Secrets (PLAID_*, X402_*, MCP_AUTH_TOKEN) are NOT set here — use
# `fly secrets set KEY=value` so they never land in git.

app = "plaid-mcp"
primary_region = "iad"

[build]
  dockerfile = "../Dockerfile"

[env]
  # Non-secret defaults. Uvicorn reads --port from the CLI, but fly's
  # health proxy respects PORT too, and having it here makes `fly ssh`
  # sessions less surprising.
  PORT = "8080"
  # Force the gate on in hosted mode. If you want a free-tier deploy
  # for testing, remove this and rely on PAYWALL=none (no x402).
  PAYWALL = "x402"
  # Testnet by default — flipping to mainnet also requires
  # X402_ALLOW_MAINNET=true (set via `fly secrets`).
  X402_NETWORK = "base-sepolia"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale-to-zero is safe for an x402 server: the first paid request
  # pays the ~1-2s cold-start tax, which is invisible next to the
  # on-chain settlement round-trip.
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    # Single-tenant: one FastMCP process handles dozens of concurrent
    # SSE streams fine; tune up if you front multiple clients.
    soft_limit = 20
    hard_limit = 25

# Persistent volume for SQLite (access tokens) + Teller enrollment.
# Create once with: fly volumes create plaid_mcp_data --region iad --size 1
[mounts]
  source = "plaid_mcp_data"
  destination = "/home/plaidmcp/.plaid-mcp"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
