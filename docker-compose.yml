# Local hosted-mode smoke tests. Mirrors what Fly.io runs in prod:
# same image, same port, same persistent volume path. Use this before
# pushing a Dockerfile change to Fly.
#
#   cp .env.example .env  # fill in PLAID_CLIENT_ID, X402_RECEIVING_ADDRESS, etc.
#   docker compose up --build
#   curl -i http://localhost:8080/mcp/   # expect 402 when PAYWALL=x402

services:
  plaid-mcp:
    build: .
    image: plaid-mcp:local
    container_name: plaid-mcp
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Named volume keeps SQLite tokens + Teller enrollment across
      # `docker compose down` / rebuilds.
      - plaid-mcp-data:/home/plaidmcp/.plaid-mcp
    restart: unless-stopped

volumes:
  plaid-mcp-data:
